server:
  port: 8082 # Fica sozinho aqui em cima

spring:
  application:
    name: order-service

  # 1. Conexão com o PostgreSQL do Docker (Porta 5433 e banco 'ecommerce')
  datasource:
    url: jdbc:postgresql://localhost:5433/ecommerce
    username: admin
    password: adminpassword
    driver-class-name: org.postgresql.Driver

  # 2. Configuração do JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 3. Desativando Liquibase temporariamente
  liquibase:
    enabled: false

  # 4. Conexão com o Kafka do Docker
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

# 5. Registro no Eureka (Fora do bloco spring)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/